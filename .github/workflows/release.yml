name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o mentant-browser-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o mentant-browser-darwin-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o mentant-browser-linux-arm64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o mentant-browser-linux-amd64 .

          # Generate checksums
          sha256sum mentant-browser-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mentant-browser-darwin-arm64
            mentant-browser-darwin-amd64
            mentant-browser-linux-arm64
            mentant-browser-linux-amd64
            checksums.txt
